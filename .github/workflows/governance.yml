name: 0n1x Autonomous Governance

on:
  schedule:
    - cron: '*/30 * * * *'   # Runs every 30 minutes, forever
  workflow_dispatch:         # Manual trigger via GitHub UI

jobs:
  govern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci || echo "No package.json, skipping install"
      
      - name: Fetch external metrics (rhinogent heartbeat)
        run: |
          curl -s https://rhinogent.com/0n1x.json -o public/metrics.json || echo "{}" > public/metrics.json
      
      - name: Run the deterministic governance brain
        run: node src/lib/governance/autonomous.js
        env:
          BRIDGE_KEY: ${{ secrets.BRIDGE_KEY }}
      
      - name: Rebuild Postgres memory cache from JSONL
        run: node scripts/rebuild-memory.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Derive playbooks from successful patterns
        run: node scripts/derive-playbooks.js
      
      - name: Compute Merkle memory root
        run: node scripts/compute-memory-merkle.js
      
      - name: Commit the new state (params, deltas, memory root)
        run: |
          git config user.name "0n1x-governance"
          git config user.email "governance@0n1x.network"
          git add public/governance/ public/learning/ src/lib/governance/params.json public/metrics.json public/citizens/
          git diff --quiet && git diff --staged --quiet || git commit -m "epoch $(date -u +%Y%m%d-%H%M) | memory-root: $(cat public/learning/merkle_memory.json | grep -o '\"root\": \"[^\"]*' | cut -d'\"' -f4 | cut -c1-16)"
          git push
